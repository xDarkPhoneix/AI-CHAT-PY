version: "3.9"

services:

  api:
    build: .
    container_name: pdf-chat-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      redis:
        condition: service_healthy

    restart: unless-stopped

    volumes:
      - ./uploads:/app/uploads

  celery:
    build: .
    container_name: pdf-chat-worker

    command: celery -A app.workers.celery_app:celery_app worker --loglevel=info

    env_file:
      - .env

    depends_on:
      redis:
        condition: service_healthy

    restart: unless-stopped

    volumes:
      - ./uploads:/app/uploads

  redis:
    image: redis:8-alpine

    container_name: pdf-chat-redis

    command: redis-server --appendonly yes

    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-insight:
    image: redis/redisinsight:latest

    container_name: pdf-chat-redis-insight

    restart: unless-stopped

    ports:
      - "5540:5540"

    depends_on:
      redis:
        condition: service_healthy

    volumes:
      - redis_insight:/data

volumes:
  redis_data:
  redis_insight: